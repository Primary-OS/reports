<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Claude...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f0ea;
      color: #3a2e28;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }

    /* Time-of-day greeting */
    .greeting {
      font-family: 'Lora', Georgia, serif;
      font-size: 2rem;
      font-weight: 400;
      color: #3a2e28;
      margin-bottom: 2.5rem;
      letter-spacing: -0.01em;
    }

    /* Logo lockup: Claude asterisk × Primary wordmark */
    .logo-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .primary-logo {
      height: 28px;
      width: auto;
      opacity: 0.85;
    }

    /* Status text */
    .status {
      font-size: 0.9rem;
      color: #9c8070;
      margin-bottom: 1.5rem;
      letter-spacing: 0.01em;
    }

    /* Spinner */
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #ddd5ca;
      border-top-color: #c96442;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 2rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Fallback */
    .fallback {
      display: none;
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: #ede7df;
      border-radius: 10px;
    }

    .fallback.visible { display: block; }

    .fallback p {
      color: #7a6a60;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 0.55rem 1.4rem;
      background: #3a2e28;
      color: #f5f0ea;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
      margin: 0.2rem;
    }

    .btn:hover { opacity: 0.8; }

    .btn-secondary {
      background: transparent;
      border: 1px solid #c4b0a0;
      color: #7a6a60;
    }

    .btn-secondary:hover { border-color: #9c8070; color: #3a2e28; opacity: 1; }

    .copied {
      color: #7a9070;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Greeting -->
    <p class="greeting" id="greeting">Moving you to an ideation session on Claude.</p>

    <!-- Logo -->
    <div class="logo-lockup">
      <img class="primary-logo" src="primary-logo-cream.png" alt="Primary">
    </div>

    <!-- Status -->
    <p class="status" id="status">Preparing your conversation</p>
    <div class="spinner" id="spinner"></div>

    <!-- Fallback (shown if extension not detected) -->
    <div class="fallback" id="fallback">
      <p>The Claude Context Loader extension is required to auto-open conversations. Install it or copy the prompt manually.</p>
      <button class="btn" id="copy-btn">Copy Prompt</button>
      <a class="btn btn-secondary" id="manual-link" href="https://claude.ai/new" target="_blank">Open Claude</a>
      <p class="copied" id="copied-msg">Copied to clipboard!</p>
    </div>
  </div>

  <script>
    // Parse params from URL hash
    function parseHash() {
      const hash = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);
      return {
        prompt: params.get("prompt") || "",
        thinking: params.get("thinking") === "true",
        submit: params.get("submit") !== "false",
        project: params.get("project") || null,
      };
    }

    const config = parseHash();

    if (!config.prompt) {
      document.getElementById("status").textContent = "This link appears to be invalid.";
      document.getElementById("spinner").style.display = "none";
    }

    let extensionResponded = false;

    function sendOpenRequest() {
      if (extensionResponded) return;
      extensionResponded = true;
      document.getElementById("status").textContent = "Opening Claude in the background...";
      window.postMessage({
        type: "CLAUDE_CHAT_OPEN",
        prompt: config.prompt,
        thinking: config.thinking,
        submit: config.submit,
        project: config.project,
      }, "*");
    }

    window.addEventListener("message", (e) => {
      if (e.data?.type === "CLAUDE_CHAT_EXTENSION_READY") {
        sendOpenRequest();
      }
      if (e.data?.type === "CLAUDE_CHAT_ACK") {
        document.getElementById("status").textContent = "Opening Claude in the background...";
      }
      if (e.data?.type === "CLAUDE_CHAT_SUBMITTED") {
        document.getElementById("status").textContent = "Switching to your conversation...";
      }
      if (e.data?.type === "CLAUDE_CHAT_DONE") {
        document.getElementById("status").textContent = "Your Claude conversation is ready.";
        document.getElementById("spinner").style.display = "none";
        setTimeout(() => window.close(), 1500);
      }
      if (e.data?.type === "CLAUDE_CHAT_ERROR") {
        document.getElementById("status").textContent = e.data.error || "Could not open Claude.";
        document.getElementById("spinner").style.display = "none";
        showFallback();
      }
    });

    let checkCount = 0;
    const checkInterval = setInterval(() => {
      if (extensionResponded) { clearInterval(checkInterval); return; }
      checkCount++;
      window.postMessage({ type: "CLAUDE_CHAT_CHECK" }, "*");
      if (checkCount >= 10) {
        clearInterval(checkInterval);
        if (!extensionResponded && config.prompt) {
          document.getElementById("spinner").style.display = "none";
          document.getElementById("status").textContent = "";
          showFallback();
        }
      }
    }, 500);

    function showFallback() {
      document.getElementById("fallback").classList.add("visible");
      const claudeUrl = "https://claude.ai/new?q=" + encodeURIComponent(config.prompt);
      document.getElementById("manual-link").href = claudeUrl;
    }

    document.getElementById("copy-btn")?.addEventListener("click", async () => {
      await navigator.clipboard.writeText(config.prompt);
      document.getElementById("copied-msg").style.display = "block";
      setTimeout(() => {
        document.getElementById("copied-msg").style.display = "none";
      }, 3000);
    });
  </script>
</body>
</html>
